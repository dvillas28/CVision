name: cvision

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvision
      POSTGRES_PASSWORD: cvision
      POSTGRES_DB: cvision
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvision -d cvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cvision-postgres-data:/var/lib/postgresql/data
    networks:
      - cvision-network

  migrate:
    build:
      context: ./backend
      target: runtime
    env_file:
      - ./backend/.env
    environment: &backend-env
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://cvision:cvision@db:5432/cvision?schema=public
      CORS_ORIGIN: http://localhost:8080
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - cvision-network

  backend:
    build:
      context: ./backend
      target: runtime
    env_file:
      - ./backend/.env
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cvision-network

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cvision-network

volumes:
  cvision-postgres-data:

networks:
  cvision-network:
